set:0}.book-spread.leaf-full{grid-template-columns:1fr}.book-spread>.book-label{color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.7)}@media(max-width:1024px){.book-spread.leaf-duo{grid-template-columns:1fr}.book-spread.leaf-duo::before,.book-spread.leaf-duo::after{display:none}}.book-right-primary{top:24px;left:4.2%;width:49%;height:58%}.book-right-secondary{left:4.2%;right:6%;bottom:28px;height:auto;display:block;overflow:visible;background:transparent;color:#111;font-size:clamp(13px,1.25vw,18px);line-height:1.03;letter-spacing:-.035em;text-transform:none;font-weight:400}.book-right-secondary .book-project-name{display:block}.book-right-secondary .book-project-meta{display:block;margin-top:6px;font-size:11px;line-height:1.05;letter-spacing:-.02em;text-transform:none;font-weight:400;max-width:36ch;opacity:.72}.book-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:12px;font-weight:400;letter-spacing:-.02em}.book-caption{position:absolute;left:12px;bottom:10px;z-index:8;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.7);font-size:11px;line-height:1;letter-spacing:-.025em;font-weight:400}.book-more{width:min(90vw,1160px);display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px;padding:24px;background:#fff;border-radius:9px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.book-more figure{margin:0}.book-more img,.book-more video{width:100%;height:auto;display:block}.book-more figcaption{margin-top:6px;font-size:11px;line-height:1;letter-spacing:-.025em;font-weight:400;color:#111}.book-bottom-nav{width:min(90vw,1160px);display:flex;justify-content:space-between;color:#fff;font-size:12px;line-height:1;letter-spacing:-.02em;font-weight:400}.book-bottom-nav a{color:#fff;opacity:.78}.book-bottom-nav a:hover{opacity:1}.project-video .book-media{background:#000}

/* 3D text monolith homepage experiment */
.monolith-stage{display:none;position:fixed;inset:0;z-index:9;align-items:flex-start;justify-content:center;overflow:hidden;background:#fff;perspective:1550px;cursor:zoom-in;}
.monolith-stage::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 29%,#fff 0%,#fff 47%,#f7f7f5 100%);pointer-events:none;}
.monolith-stage::after{content:'CLICK THE PRISM TO ENTER THE ARCHIVE';position:absolute;left:16px;bottom:13px;color:rgba(0,0,0,.38);font-size:13px;line-height:.92;text-transform:uppercase;letter-spacing:.055em;max-width:42ch;z-index:5;}
.webgl-monolith-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;opacity:1;transition:opacity .75s ease,filter .75s ease,transform .9s cubic-bezier(.2,.8,.2,1);z-index:1;}
.monolith-stage.webgl-ready .monolith-shell{display:none;}
body.monolith-zooming .webgl-monolith-canvas{opacity:0;filter:blur(12px);transform:scale(1.28);}
.monolith-shell{--prism-w:min(16vw,150px);--prism-h:min(72vh,680px);position:relative;width:var(--prism-w);height:var(--prism-h);margin-top:12vh;transform-style:preserve-3d;animation:monolithSpin 33s linear infinite;will-change:transform;transform-origin:center center;}
.monolith-core{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .9s cubic-bezier(.2,.8,.2,1),opacity .75s ease,filter .75s ease;}
.monolith-face{position:absolute;overflow:hidden;background:linear-gradient(180deg,#b9c2cb 0%,#d6dde3 17%,#f2f6f9 33%,#cdd4db 43%,#525b64 48%,#737d88 52%,#aab4bd 63%,#d4dbe1 77%,#9ba4ac 90%,#7a828b 100%);border:1px solid rgba(90,95,100,.25);box-shadow:inset 9px 0 22px rgba(255,255,255,.5),inset -13px 0 26px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.32),0 26px 84px rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.4);backface-visibility:hidden;}
.monolith-face.front{inset:0;transform:translateZ(calc(var(--prism-w) / 2))}
.monolith-face.back{inset:0;transform:rotateY(180deg) translateZ(calc(var(--prism-w) / 2))}
.monolith-face.left{top:0;bottom:0;left:50%;width:var(--prism-w);margin-left:calc(var(--prism-w) / -2);transform:rotateY(-90deg) translateZ(calc(var(--prism-w) / 2))}
.monolith-face.right{top:0;bottom:0;left:50%;width:var(--prism-w);margin-left:calc(var(--prism-w) / -2);transform:rotateY(90deg) translateZ(calc(var(--prism-w) / 2))}
.monolith-face.top{left:0;right:0;top:50%;height:var(--prism-w);margin-top:calc(var(--prism-w) / -2);transform:rotateX(90deg) translateZ(calc(var(--prism-h) / 2))}
.monolith-face.bottom{left:0;right:0;top:50%;height:var(--prism-w);margin-top:calc(var(--prism-w) / -2);transform:rotateX(-90deg) translateZ(calc(var(--prism-h) / 2))}
.monolith-text{position:absolute;inset:.45%;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;color:transparent;font-size:clamp(9px,.82vw,13px);line-height:1.3;font-weight:800;letter-spacing:-.05em;text-transform:uppercase;filter:none;transform:translateZ(.1px);z-index:4;}
.monolith-line{display:block;white-space:nowrap;}
.monolith-line:nth-child(2n){transform:translateX(-5%)}
.monolith-line:nth-child(3n){transform:translateX(-11%)}
.monolith-letter{--pulse-color:255,255,255;--i:0;display:inline-block;color:transparent;text-shadow:none;}
.monolith-letter.lit{color:rgba(var(--pulse-color),var(--i));text-shadow:0 0 calc(var(--i)*3px) rgba(255,255,255,calc(var(--i)*.55)),0 0 calc(var(--i)*9px) rgba(var(--pulse-color),calc(var(--i)*.85)),0 0 calc(var(--i)*18px) rgba(var(--pulse-color),calc(var(--i)*.45));transform:scale(calc(1 + var(--i)*.03));}
.monolith-letter[data-category="fashion"],.monolith-letter[data-category="human"],.monolith-letter[data-category="objects"]{--pulse-color:255,255,255}

.monolith-face::before{content:'';position:absolute;inset:0;background:radial-gradient(135% 55% at 34% 20%,rgba(255,255,255,.55) 0%,rgba(255,255,255,.12) 24%,transparent 52%);mix-blend-mode:screen;pointer-events:none;z-index:2;}
.monolith-face::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,transparent 9%,transparent 90%,rgba(255,255,255,.32) 100%);mix-blend-mode:screen;pointer-events:none;z-index:3;}
.monolith-face.left,.monolith-face.right{filter:brightness(.72) contrast(1.12)}.monolith-face.top{filter:brightness(1.07)}.monolith-face.bottom{filter:brightness(.62)}
.monolith-stage .monolith-shell::after{content:'';position:absolute;left:50%;bottom:-7vh;width:34vw;height:9vh;transform:translateX(-50%) rotateX(72deg);background:radial-gradient(ellipse at center,rgba(42,40,35,.22),rgba(72,68,60,.1) 34%,transparent 72%);filter:blur(14px);pointer-events:none;}
.monolith-face.back .monolith-text,.monolith-face.right .monolith-text{opacity:.68}.monolith-face.left .monolith-text{opacity:.82}.monolith-face.top .monolith-text,.monolith-face.bottom .monolith-text{opacity:.56}
.monolith-stage.mobile-image-ready .monolith-face{background-image:linear-gradient(90deg,rgba(0,0,0,.42),rgba(255,255,255,.10) 34%,rgba(0,0,0,.36) 100%),var(--mobile-face-image),linear-gradient(180deg,#101014,#2e3238);background-size:100% 100%,400% 100%,100% 100%;background-position:0 0,var(--mobile-face-position,0% 50%),0 0;border-color:rgba(255,255,255,.18);box-shadow:inset 11px 0 24px rgba(255,255,255,.28),inset -16px 0 30px rgba(0,0,0,.52),0 26px 84px rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.28)}
.monolith-stage.mobile-image-ready .monolith-face::after{background:linear-gradient(90deg,rgba(0,0,0,.78),rgba(7,7,8,.98) 45%,rgba(0,0,0,.86) 100%);mix-blend-mode:normal;opacity:0;transition:opacity .85s ease}
.monolith-stage.mobile-image-ready.mobile-blackout .monolith-face::after{opacity:1}
.monolith-stage.mobile-image-ready .monolith-text{mix-blend-mode:screen;opacity:.55;color:rgba(255,255,255,.18);text-shadow:0 1px 4px rgba(0,0,0,.7)}
.monolith-stage.mobile-image-ready .monolith-letter{color:rgba(255,255,255,.14);text-shadow:0 1px 4px rgba(0,0,0,.72)}
.monolith-stage.mobile-image-ready .monolith-letter.lit{color:rgba(255,255,255,var(--i));text-shadow:0 0 calc(var(--i)*4px) rgba(255,255,255,calc(var(--i)*.65)),0 0 calc(var(--i)*14px) rgba(255,255,255,calc(var(--i)*.55));}
.monolith-hint{position:absolute;right:16px;bottom:13px;color:rgba(0,0,0,.34);font-size:13px;line-height:.92;text-transform:uppercase;letter-spacing:.055em;text-align:right;}
@keyframes monolithSpin{0%{transform:rotateX(-5deg) rotateY(-32deg) rotateZ(-.3deg)}100%{transform:rotateX(-5deg) rotateY(328deg) rotateZ(-.3deg)}}
body.monolith-ready:not(.monolith-entered):not(.in-project){background:#fff;color:#050505;overflow:hidden;}
body.monolith-ready:not(.monolith-entered):not(.in-project) main{padding:0;min-height:100vh;}
body.monolith-ready:not(.monolith-entered):not(.in-project) .site-head{background:linear-gradient(rgba(255,255,255,.94),rgba(255,255,255,0));color:#050505;}

body.monolith-ready:not(.monolith-entered):not(.in-project) .count{color:rgba(0,0,0,.42);}
body.monolith-ready:not(.monolith-entered):not(.in-project) .about-line{display:none;}
body.monolith-ready:not(.monolith-entered):not(.in-project) .index-view{display:none;opacity:0;pointer-events:none;}
body.monolith-ready:not(.monolith-entered):not(.in-project) .monolith-stage{display:flex;}
body.monolith-zooming .monolith-core{transform:scale3d(4.8,4.8,4.8) translateZ(180px);opacity:0;filter:blur(12px);}
body.monolith-entered .monolith-stage{display:none;}
body.monolith-entered .index-view{animation:indexFadeIn .75s ease both;}
@keyframes indexFadeIn{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:scale(1)}}
@media(max-width:760px){.monolith-shell{--prism-w:min(22vw,96px);--prism-h:min(66vh,520px);margin-top:14vh}.monolith-text{font-size:clamp(7px,1.8vw,11px);line-height:1.3;inset:.7%}.monolith-hint{display:none}.monolith-stage::after{font-size:11px;left:10px;right:10px;max-width:none}}
@media(prefers-reduced-motion:reduce){.monolith-shell{animation:none;transform:rotateX(-5deg) rotateY(-32deg) rotateZ(-.3deg)}.monolith-word{animation:none}}

/* Monolith V2: Counterstep Archive slab threshold */
body.monolith-v2:not(.monolith-entered):not(.in-project){background:#f6f5f1;color:#050505;overflow:hidden;}
body.monolith-v2:not(.monolith-entered):not(.in-project) .monolith-stage{background:#f6f5f1;cursor:default;perspective:1400px;align-items:center;}

    const item = MONOLITH_LETTERS[(offset + i) % MONOLITH_LETTERS.length];
    const x = letters <= 1 ? .5 : i / (letters - 1);

  }

}

// Cache letter elements + their precomputed distances once, sorted by distance,
// so the ripple loop can sweep a thin shell instead of scanning every letter each frame.
let RIPPLE_ELS = [];
let RIPPLE_DIST = null;
let RIPPLE_ORDER = null;
function cacheRippleData(){
  // Place every letter in 3D space on the prism, then measure its distance from a single
  // origin (the center of the front face). One expanding wavefront then sweeps across the
  // whole monolith: front first, wrapping to the sides/top/bottom, reaching the back last.
  RIPPLE_ELS = [...monolithCore.querySelectorAll('.monolith-letter')];
  const n = RIPPLE_ELS.length;
  RIPPLE_DIST = new Float32Array(n);
  const H = 4.3, a = 0.5, b = H / 2;     // width=1 (half a), height ratio H (half b)
  const ox = 0, oy = 0, oz = a;          // origin = front-face center
  let maxD = 0;
  for(let i = 0; i < n; i++){
    const el = RIPPLE_ELS[i];
    const faceEl = el.closest('.monolith-face');
    const nx = (+el.dataset.fx) - .5, ny = (+el.dataset.fy) - .5;
    let X, Y, Z;
    const c = faceEl ? faceEl.classList : { contains: () => false };
    if(c.contains('front'))      { X =  nx; Y = -ny * H; Z =  a; }
    else if(c.contains('back'))  { X = -nx; Y = -ny * H; Z = -a; }
    else if(c.contains('right')) { X =  a;  Y = -ny * H; Z = -nx; }
    else if(c.contains('left'))  { X = -a;  Y = -ny * H; Z =  nx; }
    else if(c.contains('top'))   { X =  nx; Y =  b;      Z =  ny; }
    else                         { X =  nx; Y = -b;      Z = -ny; } // bottom
    const d = Math.hypot(X - ox, Y - oy, Z - oz);
    RIPPLE_DIST[i] = d;
    if(d > maxD) maxD = d;
  }
  if(maxD > 0) for(let i = 0; i < n; i++) RIPPLE_DIST[i] /= maxD;   // normalize to 0..1
  RIPPLE_ORDER = Array.from({length:n},(_,i)=>i).sort((a,b)=>RIPPLE_DIST[a]-RIPPLE_DIST[b]);
}
let letterRippleTimer = null;
let letterRippleFrame = null;
let rippleActive = false;
let prevTouched = new Set();
function clearAllRipple(){
  prevTouched.forEach((idx)=>{ const el = RIPPLE_ELS[idx]; if(el){ el.classList.remove('lit'); el._lit=false; el.style.setProperty('--i','0'); el._i='0'; } });
  prevTouched = new Set();
}
// Continuous concentric-ring ripple: spawns overlapping waves that expand and decay
// like water. Each frame only the moving shell of each wave is touched, and intensity
// is a smooth 0..1 value (no class snapping, no CSS transition) for a fluid wavefront.
function startLetterRipple(){
  if(rippleActive || !RIPPLE_ORDER || !RIPPLE_ORDER.length) return;
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  rippleActive = true;
  const order = RIPPLE_ORDER, dist = RIPPLE_DIST, els = RIPPLE_ELS, n = order.length;
  const WAVE_MS = 2400;   // time for the wave to travel the whole monolith (front -> back)
  const SPAWN_MS = 2600;  // one massive ripple at a time, brief rest between
  const MAXR = 1.0;       // travels across the entire monolith (distances normalized to 0..1)
  const WIDTH = .11;      // ring thickness (big wave)
  const MIN_I = .08;      // ignore letters dimmer than this
  const waves = [];
  let lastSpawn = -Infinity;
  function frame(now){
    if(document.body.classList.contains('monolith-entered')){ rippleActive = false; letterRippleFrame = null; clearAllRipple(); return; }
    if(now - lastSpawn >= SPAWN_MS){ waves.push({start:now, lo:0, hi:0}); lastSpawn = now; }
    const touched = new Map();
    for(let w = waves.length - 1; w >= 0; w--){
      const wave = waves[w];
      const p = (now - wave.start) / WAVE_MS;
      if(p >= 1){ waves.splice(w,1); continue; }
      const radius = p * MAXR;                    // constant-speed expansion (real ripple)
      const amp = 1 - p * .7;                     // gentle decay; the big wave stays present across the face
      const innerEdge = radius - WIDTH, outerEdge = radius + WIDTH;
      while(wave.hi < n && dist[order[wave.hi]] <= outerEdge) wave.hi++;   // grow leading edge
      while(wave.lo < wave.hi && dist[order[wave.lo]] < innerEdge) wave.lo++; // retire trailing edge
      for(let k = wave.lo; k < wave.hi; k++){
        const idx = order[k];
        const t = 1 - Math.abs(dist[idx] - radius) / WIDTH;
        if(t <= 0) continue;
        const inten = t * t * (3 - 2 * t) * amp;  // smoothstep falloff * decay
        if(inten < MIN_I) continue;               // skip faint letters -> crisp, cheap ring
        const prev = touched.get(idx);
        if(prev === undefined || inten > prev) touched.set(idx, inten);
      }
    }
    touched.forEach((inten, idx)=>{ const el = els[idx], v = inten.toFixed(2); if(!el._lit){ el.classList.add('lit'); el._lit = true; } if(el._i !== v){ el.style.setProperty('--i', v); el._i = v; } });
    prevTouched.forEach((idx)=>{ if(!touched.has(idx)){ const el = els[idx]; el.classList.remove('lit'); el._lit = false; el.style.setProperty('--i','0'); el._i = '0'; } });
    prevTouched = new Set(touched.keys());
    letterRippleFrame = requestAnimationFrame(frame);
  }
  letterRippleFrame = requestAnimationFrame(frame);
}
function stopLetterRipple(){
  rippleActive = false;
  if(letterRippleFrame) cancelAnimationFrame(letterRippleFrame);
  letterRippleFrame = null;
  clearAllRipple();
}

async function buildPortfolioEnvTexture(THREE, pmrem, picks){
  const W=2048,H=1024,cols=4,rows=2;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d'); x.fillStyle='#0b0c10'; x.fillRect(0,0,W,H);
  const cw=W/cols, ch=H/rows;
  const imgs=await Promise.all(picks.map(s=>loadImageEl(s).catch(()=>null)));
  imgs.forEach((im,i)=>{ if(!im) return; const cx=(i%cols)*cw, cy=Math.floor(i/cols)*ch;
    const ar=im.width/im.height, car=cw/ch; let dw,dh; if(ar>car){dh=ch; dw=ch*ar;} else {dw=cw; dh=cw/ar;}
    x.save(); x.beginPath(); x.rect(cx,cy,cw,ch); x.clip();
    x.drawImage(im, cx+(cw-dw)/2, cy+(ch-dh)/2, dw, dh); x.restore();
  });
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; tex.mapping=THREE.EquirectangularReflectionMapping;
  const rt=pmrem.fromEquirectangular(tex); tex.dispose(); return rt;   // return full render target so it can be disposed (no GPU leak)
}
function buildTextAtlas(THREE){
  // Archive titles tiled as a letter grid. mask = white-on-black (bump/roughness engraving);
  // cat = same letters drawn in their category color (drives the pulse's color tint).
  const W=512,H=2048,cols=12,rows=58;   // ~1:4 to match the tall faces (minimal letter stretch)
  const CAT={fashion:'#ff0000',human:'#0057ff',objects:'#ffd400'};
  const mk=()=>{const c=document.createElement('canvas');c.width=W;c.height=H;return c;};
  const cm=mk(), cc=mk(); const xm=cm.getContext('2d'), xc=cc.getContext('2d');
  xm.fillStyle='#000'; xm.fillRect(0,0,W,H); xc.fillStyle='#000'; xc.fillRect(0,0,W,H);
  xm.textAlign=xc.textAlign='center'; xm.textBaseline=xc.textBaseline='middle';
  const items = PROJECTS.flatMap(p=>p.title.toUpperCase().replace(/[^A-Z0-9]/g,'').split('').map(ch=>({ch,cat:p.category||'fashion'})));
  const cw=W/cols, ch=H/rows, f=`800 ${Math.floor(ch*0.78)}px Helvetica, Arial, sans-serif`;
  xm.font=f; xc.font=f;
  let k=0;
  for(let r=0;r<rows;r++){ for(let i=0;i<cols;i++){ const it=items[k%items.length]; k++; const X=i*cw+cw/2, Y=r*ch+ch/2;
    xm.fillStyle='#fff'; xm.fillText(it.ch, X, Y);
    xc.fillStyle=CAT[it.cat]||'#fff'; xc.fillText(it.ch, X, Y);
  } }
  const tm=new THREE.CanvasTexture(cm); tm.colorSpace=THREE.NoColorSpace; tm.anisotropy=4;
  const tc=new THREE.CanvasTexture(cc); tc.colorSpace=THREE.SRGBColorSpace; tc.anisotropy=4;
  return {mask:tm, cat:tc};
}

  function contentRect(img){
    const cw=img.clientWidth, ch=img.clientHeight, nw=img.naturalWidth, nh=img.naturalHeight;
    if(!nw||!nh||!cw||!ch) return null;
    const fit=getComputedStyle(img).objectFit||'cover';
    const s = fit==='contain' ? Math.min(cw/nw,ch/nh) : Math.max(cw/nw,ch/nh);
    const dw=nw*s, dh=nh*s;
    return {x:(cw-dw)/2, y:(ch-dh)/2, w:dw, h:dh, cw, ch};

  function clearOverlays(){ OVERLAYS.length=0; document.querySelectorAll('.laser-overlay').forEach(c=>c.remove()); }

  function buildOverlays(){
    clearOverlays();

    document.querySelectorAll('#projectGrid .book-media img').forEach(img=>{
      const data=EYES[img.getAttribute('src')];
      if(!data||!data.length) return;
      const make=()=>{

  function timing(t){

    const flick=steady ? 0.86+0.14*Math.sin(t/55+1.3)+0.05*Math.sin(t/13) : 1;
    return {chargeP, fp, inten:Math.max(.4,(0.35+0.65*chargeP)*flick), steady};

  window.addEventListener('keydown',(e)=>{
    if(e.key==='Escape' && document.body.classList.contains('art-mode')){ setArt(false); return; }
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(!document.body.classList.contains('in-project')) return;
    const tg=e.target; if(tg&&(tg.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(tg.tagName))) return;
    if(e.key && e.key.length===1){ buf=(buf+e.key.toLowerCase()).replace(/[^a-z]/g,'').slice(-3); if(buf==='art'){ toggleArt(); buf=''; } }
  });

  window.addEventListener('hashchange',()=>{ updateArtAvail(); if(document.body.classList.contains('art-mode')){ t0=performance.now(); requestAnimationFrame(buildOverlays); } });
  updateArtAvail();
  let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ sizeGlow(); if(document.body.classList.contains('art-mode')) buildOverlays(); },150); });
})();
</script>
</body>
</html>
